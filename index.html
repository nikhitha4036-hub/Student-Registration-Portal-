<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Student Registration Portal</title>

    <meta name="description"
        content="Responsive student registration portal for educational institute">

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <header>

        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

            <div class="container">

                <a class="navbar-brand fw-bold"
                    href="#">

                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
                        alt="Logo"
                        width="75">

                    EduPortal

                </a>

                <!-- DARK MODE BUTTON -->

                <button class="btn btn-light"
                    id="darkModeBtn">

                    <i class="bi bi-moon-fill"></i>

                </button>

            </div>

        </nav>

    </header>

    <!-- HERO SECTION -->

    <main>

        <section class="hero-section">

            <div class="container">

                <div class="row align-items-center">

                    <!-- LEFT SIDE -->

                    <div class="col-lg-6 mb-4">

                        <h1 class="display-5 fw-bold">
                            Student Registration Portal
                        </h1>

                        <p class="lead">
                            Complete your admission process quickly and securely.
                        </p>

                        <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644"
                            alt="Students Banner"
                            class="img-fluid rounded shadow-lg">

                    </div>

                    <!-- RIGHT SIDE -->

                    <div class="col-lg-6">

                        <div class="card border-0 shadow-lg form-card">

                            <div class="card-body p-4">

                                <!-- PROGRESS BAR -->

                                <div class="progress mb-4">

                                    <div class="progress-bar"
                                        id="progressBar"
                                        style="width: 33%;">

                                        Step 1

                                    </div>

                                </div>

                                <!-- FORM -->

                                <form id="registrationForm">

                                    <!-- STEP 1 -->

                                    <div class="form-step active">

                                        <h3 class="text-center mb-4">
                                            Personal Information
                                        </h3>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Full Name
                                            </label>

                                            <input type="text"
                                                class="form-control"
                                                id="fullName"
                                                aria-label="Full Name"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Father Name
                                            </label>

                                            <input type="text"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Date of Birth
                                            </label>

                                            <input type="date"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Gender
                                            </label>

                                            <select class="form-select"
                                                required>

                                                <option value="">
                                                    Select Gender
                                                </option>

                                                <option>
                                                    Male
                                                </option>

                                                <option>
                                                    Female
                                                </option>

                                                <option>
                                                    Other
                                                </option>

                                            </select>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Aadhaar Number
                                            </label>

                                            <input type="text"
                                                class="form-control"
                                                id="aadhaar"
                                                maxlength="12"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label class="form-label">
                                                Upload Profile Image
                                            </label>

                                            <input type="file"
                                                class="form-control"
                                                id="profileImage"
                                                accept="image/*"
                                                required>

                                        </div>

                                        <button type="button"
                                            class="btn btn-primary w-100 nextBtn">

                                            Next

                                        </button>

                                    </div>

                                    <!-- STEP 2 -->

                                    <div class="form-step">

                                        <h3 class="text-center mb-4">
                                            Contact Information
                                        </h3>

                                        <div class="mb-3">

                                            <label>Email Address</label>

                                            <input type="email"
                                                class="form-control"
                                                id="email"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label>Mobile Number</label>

                                            <input type="text"
                                                class="form-control"
                                                id="mobile"
                                                maxlength="10"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label>Address</label>

                                            <textarea class="form-control"
                                                rows="3"
                                                required></textarea>

                                        </div>

                                        <div class="mb-3">

                                            <label>City</label>

                                            <input type="text"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label>State</label>

                                            <select class="form-select"
                                                required>

                                                <option value="">
                                                    Select State
                                                </option>

                                                <option>
                                                    Andhra Pradesh
                                                </option>

                                                <option>
                                                    Telangana
                                                </option>

                                                <option>
                                                    Karnataka
                                                </option>

                                                <option>
                                                    Tamil Nadu
                                                </option>

                                            </select>

                                        </div>

                                        <div class="mb-3">

                                            <label>Pincode</label>

                                            <input type="text"
                                                class="form-control"
                                                maxlength="6"
                                                required>

                                        </div>

                                        <div class="d-flex gap-3">

                                            <button type="button"
                                                class="btn btn-secondary w-50 prevBtn">

                                                Previous

                                            </button>

                                            <button type="button"
                                                class="btn btn-primary w-50 nextBtn">

                                                Next

                                            </button>

                                        </div>

                                    </div>

                                    <!-- STEP 3 -->

                                    <div class="form-step">

                                        <h3 class="text-center mb-4">
                                            Academic & Account Information
                                        </h3>

                                        <div class="mb-3">

                                            <label>Course</label>

                                            <select class="form-select"
                                                id="course"
                                                required>

                                                <option value="">
                                                    Select Course
                                                </option>

                                                <option value="btech">
                                                    B.Tech
                                                </option>

                                                <option value="mba">
                                                    MBA
                                                </option>

                                                <option value="mca">
                                                    MCA
                                                </option>

                                            </select>

                                        </div>

                                        <div class="mb-3">

                                            <label>Department</label>

                                            <select class="form-select"
                                                id="department"
                                                required>

                                                <option value="">
                                                    Select Department
                                                </option>

                                            </select>

                                        </div>

                                        <div class="mb-3">

                                            <label>Year/Semester</label>

                                            <input type="text"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label>Skills</label>

                                            <input type="text"
                                                class="form-control">

                                        </div>

                                        <div class="mb-3">

                                            <label>Previous Qualification</label>

                                            <input type="text"
                                                class="form-control">

                                        </div>

                                        <div class="mb-3">

                                            <label>Username</label>

                                            <input type="text"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="mb-3">

                                            <label>Password</label>

                                            <div class="input-group">

                                                <input type="password"
                                                    class="form-control"
                                                    id="password"
                                                    required>

                                                <button class="btn btn-outline-secondary"
                                                    type="button"
                                                    id="togglePassword">

                                                    <i class="bi bi-eye"></i>

                                                </button>

                                            </div>

                                            <small id="passwordStrength"></small>

                                        </div>

                                        <div class="mb-3">

                                            <label>Confirm Password</label>

                                            <input type="password"
                                                class="form-control"
                                                id="confirmPassword"
                                                required>

                                        </div>

                                        <div class="d-flex gap-3">

                                            <button type="button"
                                                class="btn btn-secondary w-50 prevBtn">

                                                Previous

                                            </button>

                                            <button type="submit"
                                                class="btn btn-success w-50">

                                                Register

                                            </button>

                                        </div>

                                    </div>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- SUCCESS TOAST -->

    <div class="toast-container position-fixed top-0 end-0 p-3">

        <div id="successToast"
            class="toast text-bg-success border-0">

            <div class="d-flex">

                <div class="toast-body">

                    Registration Successful!

                </div>

                <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">

                </button>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->

    <script src="js/script.js"></script>

</body>

</html>
